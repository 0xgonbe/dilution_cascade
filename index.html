<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Dilution en cascade</title>
  <style>
    body { font-family: Arial; margin: 40px; }
    input, button { margin: 5px; padding: 5px; }
    table { margin-top: 20px; border-collapse: collapse; width: 900px; }
    th, td { border: 1px solid #ccc; padding: 8px; text-align: center; }
    th { background-color: #f2f2f2; }
    button.delete {
      background: none;
      border: none;
      color: red;
      font-size: 18px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h2>Calculateur de dilution en cascade</h2>

<label>Volume nécessaire (µL) :</label>
<input type="number" id="volume" step="any"><br>

<label>Concentration stock (µg/mL) :</label>
<input type="number" id="stock" step="any"><br>

<label>Delta (%) :</label>
<input type="number" id="delta" value="10"><br>

<h3>Concentrations</h3>

<input type="number" id="newConc">
<button onclick="addConcentration()">Ajouter</button>
<button onclick="calculate()">Calculer</button>

<table>
  <thead>
    <tr>
      <th>Concentration (µg/mL)</th>
      <th>Source</th>
      <th>Prélevé (µL)</th>
      <th>Diluant (µL)</th>
      <th>Total (µL)</th>
      <th>Supprimer ?</th>
    </tr>
  </thead>
  <tbody id="tableBody"></tbody>
</table>

<script>
let concentrations = [];

function round01(x) {
  return Math.round(x * 10) / 10;
}

function addConcentration() {
  const val = parseFloat(document.getElementById("newConc").value);
  if (isNaN(val)) return;

  concentrations.push(val);
  concentrations.sort((a,b)=>a-b);
  updateTable();
  document.getElementById("newConc").value="";
}

function removeConcentration(i){
  concentrations.splice(i,1);
  updateTable();
}

function updateTable(data=[]){
  const body=document.getElementById("tableBody");
  body.innerHTML="";

  if(data.length===0){
    concentrations.forEach((c,i)=>{
      body.innerHTML+=`
      <tr>
        <td>${c}</td><td>-</td><td>-</td><td>-</td><td>-</td>
        <td><button class="delete" onclick="removeConcentration(${i})">✖</button></td>
      </tr>`;
    });
    return;
  }

  data.forEach((r,i)=>{
    let source = r.isStock ? `Stock (${r.source})` : `${r.source} µg/mL`;
    body.innerHTML+=`
    <tr>
      <td>${r.conc}</td>
      <td>${source}</td>
      <td>${r.take}</td>
      <td>${r.dil}</td>
      <td>${r.total}</td>
      <td><button class="delete" onclick="removeConcentration(${i})">✖</button></td>
    </tr>`;
  });
}

function calculate(){
  const Vfinal = parseFloat(document.getElementById("volume").value);
  const stock = parseFloat(document.getElementById("stock").value);
  const delta = parseFloat(document.getElementById("delta").value)||0;

  if(!Vfinal || !stock || concentrations.length===0){
    alert("Remplis tout");
    return;
  }

  let factor = 1 + delta/100;
  let n = concentrations.length;

  let totals = new Array(n).fill(Vfinal * factor);

  // propagation des besoins
  for(let i=0;i<n-1;i++){
    let frac = concentrations[i]/concentrations[i+1];
    totals[i+1]+=totals[i]*frac;
  }

  let results=[];

  for(let i=0;i<n;i++){
    let Ci=concentrations[i];
    let Csrc=(i===n-1)?stock:concentrations[i+1];

    let ratio = Ci/Csrc;

    let Vtotal = totals[i];
    let Vtake = Vtotal * ratio;

    // contrainte pipette
    if(Vtake < 1){
      Vtake = 1;
      Vtotal = Vtake / ratio;
    }

    let Vdil = Vtotal - Vtake;

    // arrondi
    Vtake = round01(Vtake);
    Vdil = round01(Vdil);
    Vtotal = round01(Vtake + Vdil);

    results.push({
      conc: Ci,
      source: Csrc,
      take: Vtake,
      dil: Vdil,
      total: Vtotal,
      isStock: i===n-1
    });
  }

  updateTable(results);
}
</script>

</body>
</html>
